name: Invoice Validation Workflow

on:
  schedule:
    - cron: '0 6 */4 * *'
  workflow_dispatch:

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg unzip
        
    - name: Install Chrome browser
      run: |
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Install ChromeDriver
      run: |
        CHROME_VERSION=$(google-chrome --version | cut -d ' ' -f3 | cut -d '.' -f1)
        CHROMEDRIVER_VERSION=$(curl -sS chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_VERSION)
        wget -N http://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip
        unzip chromedriver_linux64.zip
        sudo mv chromedriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/chromedriver
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy requests schedule openpyxl xlsxwriter beautifulsoup4 lxml python-dateutil pytz
        pip install selenium webdriver-manager
        pip install streamlit plotly
        pip install xlrd>=2.0.1
        
    - name: Verify installations
      run: |
        google-chrome --version
        chromedriver --version
        python -c "import selenium; print('Selenium version:', selenium.__version__)"
        
    - name: Run invoice validation
      run: |
        python3 main.py run
      env:
        RMS_BASE_URL: https://rms.koenig-solutions.com
        DB_PATH: invoice_validation.db
        EXCEL_PATH: invoice_validation_report.xlsx
        RMS_USERNAME: ${{ secrets.RMS_USERNAME }}
        RMS_PASSWORD: ${{ secrets.RMS_PASSWORD }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
        SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
        EMAIL_DEBUG: ${{ secrets.EMAIL_DEBUG }}
        
    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-results
        path: |
          *.xlsx
          *.csv
          *.log
          data/
        retention-days: 30
