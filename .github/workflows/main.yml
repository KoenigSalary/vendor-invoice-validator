name: Invoice Validation Workflow

on:
  schedule:
    - cron: '0 6 */4 * *'   # every 4 days at 06:00 UTC
  workflow_dispatch:

jobs:
  validate-invoices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11.9'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg unzip fonts-liberation
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip cache purge
          pip install --no-cache-dir numpy==1.24.3
          if [ -f requirements.txt ]; then
            pip install --no-cache-dir -r requirements.txt --force-reinstall
          else
            pip install pandas==2.0.3 requests==2.31.0 schedule==1.2.0
            pip install openpyxl==3.1.2 xlsxwriter==3.1.7 python-dateutil==2.8.2 pytz==2023.3
            pip install beautifulsoup4==4.12.2 lxml==4.9.3
            pip install selenium==4.15.0 webdriver-manager==4.0.1
            pip install plotly==5.17.0 xlrd==1.2.0 python-dotenv==1.0.0
          fi
          pip install autopep8

      - name: Show lines around 581 for debugging
        run: |
          echo "----- main.py lines 570..595 -----"
          nl -ba main.py | sed -n '570,595p' || true
          echo "---------------------------------"

      # (Optional) If you truly need the cleanup steps, add them back *carefully* as separate steps.

      - name: Auto-format Python code
        run: |
          autopep8 --in-place --aggressive --aggressive --recursive .

      - name: Verify installations
        run: |
          google-chrome --version
          python -c "import selenium; print('Selenium version:', selenium.__version__)"
          python -c "from webdriver_manager.chrome import ChromeDriverManager; print('WebDriver Manager: OK')"
          python -c "import pandas as pd; print('Pandas version:', pd.__version__)"

      - name: Check if main.py exists
        run: |
          if [ ! -f main.py ]; then
            echo "Error: main.py not found in repository root"
            ls -la
            exit 1
          fi

      - name: Byte-compile to catch syntax early
        run: python -m py_compile main.py

      - name: Run invoice validation (xvfb)
        run: xvfb-run -a python3 main.py run 2>&1 | tee run.log
        env:
          RMS_BASE_URL: https://rms.koenig-solutions.com
          DB_PATH: invoice_validation.db
          EXCEL_PATH: invoice_validation_report.xlsx
          RMS_USER: ${{ secrets.RMS_USER }}
          RMS_PASS: ${{ secrets.RMS_PASS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
          EMAIL_DEBUG: "false"
          SEND_EMAIL: "1"

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-${{ github.run_number }}
          path: |
            *.xlsx
            *.csv
            *.log
            *.db
            data/
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ github.run_number }}
          path: |
            run.log
            *.log
            /tmp/*.log
          retention-days: 7
