name: Enhanced Invoice Validator - Automated Processing

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 */4 * *'  # Every 4 days at 6:00 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  process-invoices:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: 📦 Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🔄 Process Enhanced Invoices
      run: |
        echo "🚀 Starting Enhanced Invoice Processing..."
        echo "📅 Current date: $(date)"
        # Add your processing commands here
        echo "✅ Invoice processing completed!"
        
    - name: 📧 Send Enhanced Email Notifications
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
        AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
        EMAIL_DEBUG: ${{ secrets.EMAIL_DEBUG }}
      run: |
        echo "📧 Starting email notification process..."
        python -c "
        import os
        print('EMAIL_USER configured:', bool(os.getenv('EMAIL_USER')))
        print('SMTP_SERVER:', os.getenv('SMTP_SERVER', 'Not configured'))
        print('RECIPIENTS configured:', bool(os.getenv('AP_TEAM_EMAIL_LIST')))
        
        from email_notifier import send_validation_complete_email
        try:
            send_validation_complete_email()
            print('✅ Email notifications sent successfully')
        except Exception as e:
            print(f'⚠️ Email notification failed: {str(e)}')
        "
