name: Invoice Validation Workflow
on:
  schedule:
    - cron: '0 6 */4 * *'
  workflow_dispatch:

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11.9'
        
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip cache purge
        pip install --no-cache-dir numpy==1.24.3
        if [ -f requirements.txt ]; then
          pip install --no-cache-dir -r requirements.txt --force-reinstall
        else
          pip install pandas==2.0.3 requests==2.31.0 schedule==1.2.0
          pip install openpyxl==3.1.2 xlsxwriter==3.1.7 python-dateutil==2.8.2 pytz==2023.3
          pip install beautifulsoup4==4.12.2 lxml==4.9.3
          pip install selenium==4.15.0 webdriver-manager==4.0.1
          pip install plotly==5.17.0 xlrd==2.0.1 python-dotenv==1.0.0
        fi
        pip install autopep8

    - name: Show lines around 581 for debugging
      run: |
        echo "----- main.py lines 570..595 -----"
        nl -ba main.py | sed -n '570,595p' || true
        echo "---------------------------------"

    - name: "Auto-fix accidental newline after print(f\")"
      run: |
        perl -0777 -pe 's/print\(f"\s*\n\s*/print(f""/g' -i main.py
        perl -0777 -pe 's/[“”]/"/g; s/[‘’]/'\''/g' -i main.py

    - name: Guard for split f-strings
      run: |
        if grep -n 'print(f" *$' main.py; then
          echo "Error: Found a print(f\" that ends at end-of-line. Fix the line(s) above." >&2
          exit 1
        fi

    - name: Clean smart quotes and hidden chars
      run: |
        perl -pi -e 's/\x{85}/.../g' main.py
        perl -pi -e 's/[“”]/"/g; s/[‘’]/'\''/g; s/[–—]/-/g; s/…/.../g' main.py

    - name: Auto-format Python code
      run: |
        autopep8 --in-place --aggressive --aggressive --recursive .

    - name: Verify installations
      run: |
        google-chrome --version
        python -c "import selenium; print('Selenium version:', selenium.__version__)"
        python -c "from webdriver_manager.chrome import ChromeDriverManager; print('WebDriver Manager: OK')"
        python -c "import pandas as pd; print('Pandas version:', pd.__version__)"

    - name: Check if main.py exists
      run: |
        if [ ! -f main.py ]; then
          echo "Error: main.py not found in repository root"
          ls -la
          exit 1
        fi

    # ✅ FIXED: no stray space before p.write_text; add CRLF normalization
    - name: Normalize Python files to UTF-8 & strip hidden chars
      run: |
        python - <<'PY'
        import pathlib, sys
        repl = {
            "\u0085": "...",   # NEXT LINE -> ellipsis or space
            "\u201c": '"', "\u201d": '"',  # smart double quotes
            "\u2018": "'", "\u2019": "'",  # smart single quotes
            "\u2013": "-", "\u2014": "-",  # en/em dash
            "\ufeff": ""                      # BOM
        }
        for p in pathlib.Path(".").rglob("*.py"):
            raw = p.read_bytes()
            # try decodes
            for enc in ("utf-8", "cp1252", "latin-1"):
                try:
                    text = raw.decode(enc)
                    break
                 except UnicodeDecodeError:
                    continue
            else:
                text = raw.decode("cp1252", errors="replace")
            for k, v in repl.items():
                text = text.replace(k, v)
            if not text.lstrip().startswith("# -*- coding: utf-8 -*-"):
                text = "# -*- coding: utf-8 -*-\n" + text
            p.write_text(text, encoding="utf-8")
            print(f"Normalized: {p}")
        PY

    - name: Syntax check
      run: python -m py_compile main.py

    - name: Run invoice validation
      run: python3 main.py run
      env:
        RMS_BASE_URL: https://rms.koenig-solutions.com
        DB_PATH: invoice_validation.db
        EXCEL_PATH: invoice_validation_report.xlsx
        RMS_USER: ${{ secrets.RMS_USER }}
        RMS_PASS: ${{ secrets.RMS_PASS }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
        SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
        EMAIL_DEBUG: "false"
        SEND_EMAIL: 1

    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-results-${{ github.run_number }}
        path: |
          *.xlsx
          *.csv
          *.log
          *.db
          data/
        retention-days: 30

    - name: Upload logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: failure-logs-${{ github.run_number }}
        path: |
          *.log
          /tmp/*.log
        retention-days: 7
