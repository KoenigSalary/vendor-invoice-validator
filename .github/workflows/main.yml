name: 🚀 Enhanced Invoice Validation System - Excel & ZIP

on:
  schedule:
    # Run every 4 days at 18:00 UTC (6:00 PM IST)
    - cron: '0 18 */4 * *'
  
  workflow_dispatch:
    inputs:
      validation_period:
        description: 'Validation period (e.g., current)'
        required: false
        default: 'current'
      
      send_email:
        description: 'Send email notifications'
        required: false
        default: 'true'
        type: boolean

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install Dependencies  
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🔍 Debug Environment
      run: |
        echo "📂 Current directory contents:"
        ls -la
        echo "📊 Python packages installed:"
        pip list | grep -E "(pandas|openpyxl|email|smtp)"
        
    - name: 📊 Generate Excel Validation Report
      run: |
        echo "📊 Generating enhanced Excel validation report..."
        python enhanced_processor.py
        echo "📂 Files after Excel generation:"
        ls -la invoice_validation_report_*.xlsx || echo "❌ No Excel files found"
        
    - name: 📥 Download Real Invoice Data
      run: |
        echo "📥 Running RMS data download..."
        python main.py
        echo "📁 Downloaded files:"
        ls -la data/$(date +%Y-%m-%d)/ || echo "No data folder found"
      env:
        RMS_USERNAME: ${{ secrets.RMS_USERNAME }}
        RMS_PASSWORD: ${{ secrets.RMS_PASSWORD }}
   
    - name: 📧 Send Professional Email with ZIP
      run: |
        echo "📧 Sending professional email notifications..."
        python -c "
        import os
        import sys
        from email_notifier import EnhancedEmailSystem
        
        try:
            # Initialize email system
            email_system = EnhancedEmailSystem()
            print('✅ Email system initialized')
            
            # Run the complete email workflow (creates ZIP and sends email)
            from email_notifier import main
            result = main()
            
            if result:
                print('✅ Email workflow completed successfully!')
            else:
                print('❌ Email workflow failed')
                sys.exit(1)
                
        except Exception as e:
            print(f'❌ Email error: {e}')
            import traceback
            traceback.print_exc()
            sys.exit(1)
        "
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.office365.com' }}
        SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME || 'aditya.singh@koenig-solutions.com' }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM || 'aditya.singh@koenig-solutions.com' }}
        SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME || 'Invoice Management System' }}
        AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST || 'tax@koenig-solutions.com,aditya.singh@koenig-solutions.com,ap@koenig-solutions.com' }}
        EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS || 'tax@koenig-solutions.com,aditya.singh@koenig-solutions.com,ap@koenig-solutions.com' }}
        
    - name: 📂 Verify File Creation
      run: |
        echo "📂 Final file listing:"
        ls -la
        echo "📊 Excel reports:"
        ls -la invoice_validation_report_*.xlsx || echo "❌ No Excel reports found"
        echo "📁 ZIP files:"
        ls -la invoice_validation_*.zip || echo "❌ No ZIP files found"
        
    - name: 📤 Upload Validation Reports
      uses: actions/upload-artifact@v4
      with:
        name: excel-validation-reports
        path: invoice_validation_report_*.xlsx
        retention-days: 30
        if-no-files-found: warn
        
    - name: 📤 Upload Invoice ZIP Archives  
      uses: actions/upload-artifact@v4
      with:
        name: invoice-zip-archives
        path: invoice_validation_*.zip
        retention-days: 7
        if-no-files-found: warn
        
    - name: ✅ Workflow Summary
      run: |
        echo "🎉 Invoice Validation Workflow Completed!"
        echo "📊 Excel reports generated and processed"
        echo "📁 ZIP archives created with invoice files"
        echo "📧 Professional email notifications sent to AP team"
        echo "🔄 Next automated run: In 4 days"
