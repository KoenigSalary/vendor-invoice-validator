name: Invoice Validation

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'  # Run at 6 AM daily

jobs:
  invoice-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'  # Adjust the Python version if necessary

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment variables
        run: |
          echo "RMS_BASE_URL=https://rms.koenig-solutions.com" >> $GITHUB_ENV
          echo "DB_PATH=invoice_validation.db" >> $GITHUB_ENV
          echo "EXCEL_PATH=invoice_validation_report.xlsx" >> $GITHUB_ENV
          # Add any other required variables here

      - name: Run Invoice Validation
        run: python3 main.py run  # Assuming 'run' is your command in main.py
