name: 🚀 Enhanced Invoice Validation System - Excel & ZIP

on:
  schedule:
    # Run every 4 days at 18:00 UTC (6:00 PM IST)
    - cron: '0 18 */4 * *'
  
  workflow_dispatch:
    inputs:
      validation_period:
        description: 'Validation period (e.g., 2024-08-14 to 2024-08-18)'
        required: false
        default: 'current'
      
      send_email:
        description: 'Send email notifications'
        required: false
        default: 'true'
        type: boolean

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 📂 Create Directories
      run: |
        mkdir -p data
        mkdir -p invoice_files
        echo "Sample PDF content" > invoice_files/sample_invoice_001.pdf
        echo "Another invoice file" > invoice_files/sample_invoice_002.pdf
        echo "Third sample invoice" > invoice_files/sample_invoice_003.jpg
        
    - name: 📊 Generate Excel Validation Report
      run: |
        echo "🚀 Starting Excel report generation..."
        python enhanced_processor.py
        echo "📋 Listing generated files:"
        ls -la *.xlsx || echo "No Excel files found"
        ls -la invoice_validation_*.xlsx || echo "No validation reports found"
        
    - name: 📁 Create ZIP Package
      run: |
        echo "📦 Creating ZIP package with reports and invoices..."
        python email_notifier.py
        echo "📂 Listing all files:"
        ls -la
        echo "🔍 Looking for ZIP files:"
        ls -la *.zip || echo "No ZIP files found"
        
    - name: 📧 Send Email Notifications
      if: github.event.inputs.send_email != 'false'
      env:
        SMTP_SERVER: smtp.office365.com
        SMTP_PORT: 587
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME || 'aditya.singh@koenig-solutions.com' }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD || 'grvggfjnckqwqfgw' }}
        SMTP_USE_TLS: true
        EMAIL_FROM: aditya.singh@koenig-solutions.com
        SMTP_FROM_NAME: Invoice Management System
        AP_TEAM_EMAIL_LIST: tax@koenig-solutions.com,aditya.singh@koenig-solutions.com,ap@koenig-solutions.com
        EMAIL_RECIPIENTS: tax@koenig-solutions.com,aditya.singh@koenig-solutions.com,ap@koenig-solutions.com
      run: |
        echo "📧 Sending professional email notifications..."
        python -c "
        import os
        import sys
        from email_notifier import EnhancedEmailSystem
        
        try:
            email_system = EnhancedEmailSystem()
            print('✅ Email system initialized')
            
            # Test email sending
            result = email_system.send_validation_email()
            if result:
                print('✅ Email sent successfully!')
            else:
                print('❌ Email sending failed')
                sys.exit(1)
        except Exception as e:
            print(f'❌ Email error: {e}')
            sys.exit(1)
        "
        
    - name: 📤 Upload Excel Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: excel-validation-reports
        path: |
          invoice_validation_report_*.xlsx
          *.xlsx
        retention-days: 30
        if-no-files-found: warn
        
    - name: 📤 Upload ZIP Archives
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: invoice-zip-archives
        path: |
          invoice_validation_*.zip
          *.zip
        retention-days: 7
        if-no-files-found: warn
        
    - name: 📊 Processing Summary
      if: always()
      run: |
        echo "=========================="
        echo "📊 PROCESSING SUMMARY"
        echo "=========================="
        echo "📅 Date: $(date)"
        echo "🔄 Trigger: ${{ github.event_name }}"
        
        if [ -f invoice_validation_report_*.xlsx ]; then
          echo "✅ Excel Report: Generated"
        else
          echo "❌ Excel Report: Not found"
        fi
        
        if [ -f invoice_validation_*.zip ]; then
          echo "✅ ZIP Archive: Created"
        else
          echo "❌ ZIP Archive: Not found"
        fi
        
        echo "📧 Email Status: Processed"
        echo "📂 Files in directory:"
        ls -la
        echo "=========================="
        
    - name: 🧹 Cleanup Temporary Files
      if: always()
      run: |
        echo "🧹 Cleaning up temporary files..."
        find . -name "*.tmp" -delete 2>/dev/null || true
        find . -name "*.log" -type f -mtime +1 -delete 2>/dev/null || true
        echo "✅ Cleanup completed"
