name: Invoice Validation Workflow

on:
  schedule:
    - cron: '0 6 */4 * *'
  workflow_dispatch:

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas==2.0.3 numpy==1.24.3 requests==2.31.0 schedule==1.2.0
        pip install openpyxl==3.1.2 xlsxwriter==3.1.7 python-dateutil==2.8.2 pytz==2023.3
        pip install beautifulsoup4==4.12.2 lxml==4.9.3 
        pip install selenium==4.15.0 webdriver-manager==4.0.1
        pip install streamlit==1.28.1 plotly==5.17.0
        pip install xlrd>=2.0.1
        pip install python-dotenv>=1.0.0  
        
    - name: Verify Chrome installation
      run: |
        google-chrome --version
        python -c "import selenium; print('Selenium:', selenium.__version__)"
        python -c "from webdriver_manager.chrome import ChromeDriverManager; print('WebDriver Manager: OK')"
        
    - name: Run invoice validation
        python3 main.py run
      env:
        RMS_BASE_URL: https://rms.koenig-solutions.com
        DB_PATH: invoice_validation.db
        EXCEL_PATH: invoice_validation_report.xlsx
        RMS_USERNAME: ${{ secrets.RMS_USERNAME }}
        RMS_PASSWORD: ${{ secrets.RMS_PASSWORD }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
        SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
        EMAIL_DEBUG: ${{ secrets.EMAIL_DEBUG }}
        
    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-results
        path: |
          *.xlsx
          *.csv
          *.log
          data/
        retention-days: 30
