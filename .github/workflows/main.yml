name: 🚀 Enhanced Invoice Validation System - Real Data

on:
  schedule:
    # Run every 4 days at 18:00 UTC (6:00 PM IST)
    - cron: '0 18 */4 * *'
  
  workflow_dispatch:
    inputs:
      validation_period:
        description: 'Validation period (e.g., current)'
        required: false
        default: 'current'
      
      send_email:
        description: 'Send email notifications'
        required: false
        default: 'true'
        type: boolean

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install Dependencies  
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🌐 Setup Chrome for Selenium
      uses: browser-actions/setup-chrome@latest
      
    - name: 🔍 Debug Environment
      run: |
        echo "📂 Current directory contents:"
        ls -la
        echo "📊 Python packages installed:"
        pip list | grep -E "(pandas|openpyxl|selenium|dotenv|requests)"
        echo "🌐 Chrome version:"
        google-chrome --version
        
    - name: 📥 Run Complete Invoice Validation Workflow
      run: |
        echo "🚀 Starting complete invoice validation workflow..."
        python main.py
      env:
        RMS_USERNAME: ${{ secrets.RMS_USERNAME }}
        RMS_PASSWORD: ${{ secrets.RMS_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.office365.com' }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SMTP_USE_TLS: true
        SMTP_PORT: 587
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        SMTP_FROM_NAME: Invoice Management System
        AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
        EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        
    - name: 📂 Verify Generated Files
      run: |
        echo "📂 Generated files:"
        find . -name "*.xlsx" -o -name "*.zip" -o -name "*.html" | head -20
        echo ""
        echo "📁 Data directory:"
        ls -la data/ || echo "No data directory"
        echo ""
        echo "📋 Today's data:"
        ls -la data/$(date +%Y-%m-%d)/ || echo "No today's data folder"
        
    - name: 📤 Upload All Validation Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: validation-results-${{ github.run_number }}
        path: |
          data/**/*.xlsx
          data/**/*.zip
          data/**/*.html
          **/*validation*.xlsx
          **/*invoice*.zip
        retention-days: 30
        if-no-files-found: warn
        
    - name: ✅ Workflow Summary
      run: |
        echo "🎉 Enhanced Invoice Validation Workflow Completed!"
        echo "📥 Real RMS data downloaded"
        echo "🔍 Invoice validation performed"
        echo "📊 Excel reports generated with creator names"
        echo "📧 Email notifications sent to AP team"
        echo "🔄 Next automated run: In 4 days"
