name: "Invoice Validation with ZIP Attachments"

on:
  schedule:
    - cron: '0 9 */4 * *'  # Every 4 days at 9 AM UTC
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Chrome and ChromeDriver
      run: |
        # Install Chrome
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
        # Install ChromeDriver
        CHROME_VERSION=$(google-chrome --version | cut -d " " -f3 | cut -d "." -f1)
        CHROMEDRIVER_VERSION=$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_${CHROME_VERSION}")
        wget -O /tmp/chromedriver.zip "https://chromedriver.storage.googleapis.com/${CHROMEDRIVER_VERSION}/chromedriver_linux64.zip"
        sudo unzip /tmp/chromedriver.zip chromedriver -d /usr/local/bin/
        sudo chmod +x /usr/local/bin/chromedriver

    - name: Create Invoice Files Directory
      run: |
        mkdir -p invoice_files
        # Create sample invoice files for testing
        echo "Sample Invoice 1" > invoice_files/INV001.pdf
        echo "Sample Invoice 2" > invoice_files/INV002.pdf
        echo "Sample Invoice 3" > invoice_files/INV003.pdf

    - name: Prepare Invoice Data
      run: |
        # Create sample invoices.csv if not exists
        if [ ! -f invoices.csv ]; then
          echo "Invoice_ID,Invoice_Date,Vendor_Name,Amount,Location,Currency" > invoices.csv
          echo "INV001,2024-08-14,ABC Corp Ltd,25000,Delhi,INR" >> invoices.csv
          echo "INV002,2024-08-13,XYZ Services,15000,Mumbai,INR" >> invoices.csv
          echo "INV003,2024-08-12,Global Tech,30000,Bangalore,INR" >> invoices.csv
          echo "INV004,2024-08-11,Supplies Inc,12000,Chennai,INR" >> invoices.csv
          echo "INV005,2024-08-10,IT Solutions,45000,Gurgaon,INR" >> invoices.csv
        fi

    - name: Generate Excel Validation Report
      run: |
        echo "🚀 Starting Invoice Processing..."
        python enhanced_processor.py
        echo "✅ Excel report generated successfully!"
        
        # List generated files
        ls -la *.xlsx || echo "No Excel files found"
        ls -la invoice_files/ || echo "No invoice files directory"

    - name: Create ZIP with Reports and Invoices
      run: |
        echo "📦 Creating ZIP file with Excel report and invoice files..."
        
        # Find the latest Excel report
        EXCEL_REPORT=$(ls -t invoice_validation_report_*.xlsx | head -n1)
        echo "Found Excel report: $EXCEL_REPORT"
        
        # Create ZIP filename with timestamp
        ZIP_NAME="invoices_validation_$(date +%Y%m%d_%H%M%S).zip"
        
        # Create ZIP file
        zip -r $ZIP_NAME "$EXCEL_REPORT" invoice_files/
        
        echo "✅ ZIP file created: $ZIP_NAME"
        ls -la *.zip

    - name: Send Email with ZIP Attachment
      run: python email_notifier.py
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        RECIPIENTS: ${{ secrets.RECIPIENTS }}

    - name: Upload Reports as Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: validation-reports
        path: |
          *.xlsx
          *.zip
        retention-days: 30

    - name: Cleanup Temporary Files
      run: |
        echo "🧹 Cleaning up temporary files..."
        rm -f *.xlsx *.zip
        echo "✅ Cleanup completed!"

  send-summary:
    needs: validate-invoices
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Send Workflow Summary
      run: |
        echo "📊 Invoice Validation Workflow Completed"
        echo "Status: ${{ needs.validate-invoices.result }}"
        echo "Timestamp: $(date)"
