name: Invoice Validation Workflow

on:
  schedule:
    - cron: '0 6 */4 * *'
  workflow_dispatch:

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Auto-format with autopep8
      run: |
        pip install --upgrade pip
        pip install autopep8
        # Option A: recurse through folders
        autopep8 --in-place --aggressive --aggressive --recursive .
        # Option B (safer): only tracked Python files
        # autopep8 --in-place --aggressive --aggressive $(git ls-files "*.py")
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy requests schedule
        pip install openpyxl xlsxwriter python-dateutil pytz
        pip install beautifulsoup4 lxml 
        pip install selenium webdriver-manager
        pip install streamlit plotly
        pip install xlrd python-dotenv
        
    - name: Verify Chrome installation
      run: |
        google-chrome --version
        python -c "import selenium; print('Selenium:', selenium.__version__)"
        python -c "from webdriver_manager.chrome import ChromeDriverManager; print('WebDriver Manager: OK')"
        
    # Step to auto-format code to fix indentation issues
    - name: Auto-format Python code
      run: |
        pip install autopep8
        autopep8 --in-place --aggressive --aggressive .
        
    - name: Run invoice validation
      run: |
        python3 main.py run
      env:
        RMS_BASE_URL: https://rms.koenig-solutions.com
        DB_PATH: invoice_validation.db
        EXCEL_PATH: invoice_validation_report.xlsx
        RMS_USER: ${{ secrets.RMS_USER }}
        RMS_PASS: ${{ secrets.RMS_PASS }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
        SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
        EMAIL_DEBUG: "false"
        SEND_EMAIL: 1
  
    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-results
        path: |
          *.xlsx
          *.csv
          *.log
          data/
        retention-days: 30
