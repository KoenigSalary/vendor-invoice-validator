name: 🚀 Enhanced Invoice Validation System - Excel & ZIP

on:
  schedule:
    # Run every 4 days at 18:00 UTC (6:00 PM IST)
    - cron: '0 18 */4 * *'
  
  workflow_dispatch:
    inputs:
      validation_period:
        description: 'Validation period (e.g., current)'
        required: false
        default: 'current'
      
      send_email:
        description: 'Send email notifications'
        required: false
        default: 'true'
        type: boolean

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install Dependencies  
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🔍 Debug Environment
      run: |
        echo "📂 Current directory contents:"
        ls -la
        echo "📊 Python packages installed:"
        pip list | grep -E "(pandas|openpyxl|selenium|dotenv|requests)"
        
    - name: 🌐 Setup Chrome for Selenium
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: stable
        
    - name: 📥 Download Real Invoice Data from RMS
      run: |
        echo "📥 Running RMS data download..."
        python -c "
        try:
            from main import run_invoice_validation
            print('🚀 Starting invoice validation workflow...')
            success = run_invoice_validation()
            if success:
                print('✅ Invoice validation completed successfully!')
            else:
                print('❌ Invoice validation failed!')
                exit(1)
        except Exception as e:
            print(f'❌ Validation error: {e}')
            import traceback
            traceback.print_exc()
            exit(1)
        "
        echo "📁 Downloaded files:"
        ls -la data/$(date +%Y-%m-%d)/ || echo "No data folder found"
      env:
        RMS_USERNAME: ${{ secrets.RMS_USERNAME }}
        RMS_PASSWORD: ${{ secrets.RMS_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.office365.com' }}
        SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS || 'true' }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME || 'Invoice Management System' }}
        AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
        EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        
    - name: 📂 Verify File Creation
      run: |
        echo "📂 Final file listing:"
        ls -la
        echo "📊 Excel reports:"
        find . -name "*.xlsx" -type f || echo "❌ No Excel reports found"
        echo "📁 ZIP files:"
        find . -name "*.zip" -type f || echo "❌ No ZIP files found"
        echo "📋 Invoice files:"
        ls -la invoice_files/ || echo "❌ No invoice files directory"
        
    - name: 📤 Upload Validation Reports
      uses: actions/upload-artifact@v4
      with:
        name: validation-reports-${{ github.run_number }}
        path: |
          **/*.xlsx
          data/**/*
        retention-days: 30
        if-no-files-found: warn
        
    - name: 📤 Upload Invoice Archives  
      uses: actions/upload-artifact@v4
      with:
        name: invoice-archives-${{ github.run_number }}
        path: |
          **/*.zip
          invoice_files/**/*
        retention-days: 7
        if-no-files-found: warn
        
    - name: ✅ Workflow Summary
      run: |
        echo "🎉 Invoice Validation Workflow Completed!"
        echo "📊 Real RMS data processed"
        echo "📁 Validation reports generated"
        echo "📧 Email notifications sent to AP team"
        echo "🔄 Next automated run: In 4 days"
        echo ""
        echo "📋 Files created:"
        find . -name "*.xlsx" -o -name "*.zip" | head -10
