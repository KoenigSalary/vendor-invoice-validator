name: 🚀 Enhanced Invoice Validation System - Excel & ZIP

on:
  schedule:
    # Run every 4 days at 18:00 UTC (6:00 PM)
    - cron: '0 18 */4 * *'
  
  workflow_dispatch:
    inputs:
      validation_period:
        description: 'Validation period (e.g., 2024-08-14 to 2024-08-18)'
        required: false
        default: 'current'
      
      send_email:
        description: 'Send email notification'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  validate-invoices:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install openpyxl pandas python-dotenv requests beautifulsoup4
    
    - name: 🏗️ Setup Chrome for Selenium
      uses: browser-actions/setup-chrome@v1
    
    - name: 📊 Create sample data if needed
      run: |
        if [ ! -f invoices.csv ] || [ ! -s invoices.csv ]; then
          echo "Creating sample invoice data..."
          cat > invoices.csv << 'EOF'
        Invoice_ID,Invoice_Date,Vendor_Name,Amount,Location,Currency,Vendor_Address,Invoice_Type,Payment_Terms,Due_Date,Tax_Rate,Description,PO_Number,Category,Approval_Status
        INV2024001,2024-08-10,Microsoft Corporation,125000,Delhi,INR,"One Microsoft Way Redmond",Service,Net 30,2024-09-10,18,Software Licenses,PO2024001,IT Services,Pending
        INV2024002,2024-08-11,Amazon Web Services,75000,Mumbai,INR,"410 Terry Ave N Seattle",Service,Net 15,2024-08-26,18,Cloud Services,PO2024002,IT Infrastructure,Approved
        INV2024003,2024-08-12,Dell Technologies,250000,Bangalore,INR,"One Dell Way Round Rock",Hardware,Net 45,2024-09-26,18,Server Hardware,PO2024003,Equipment,Pending
        EOF
        fi
    
    - name: 📁 Create invoice files directory
      run: |
        mkdir -p invoice_files
        echo "Sample invoice content for INV2024001" > invoice_files/INV2024001.txt
        echo "Sample invoice content for INV2024002" > invoice_files/INV2024002.txt
        echo "Sample invoice content for INV2024003" > invoice_files/INV2024003.txt
    
    - name: 🔄 Run Enhanced Invoice Processor (Excel)
      run: python enhanced_processor.py
      env:
        VALIDATION_PERIOD: ${{ inputs.validation_period || 'current' }}
    
    - name: 📧 Send Email with ZIP Attachments
      if: ${{ inputs.send_email != 'false' }}
      run: python email_notifier.py
      env:
        # SMTP Configuration
        SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.office365.com' }}
        SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
        EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_USE_TLS: true
        EMAIL_FROM: ${{ secrets.EMAIL_FROM || secrets.EMAIL_USERNAME }}
        SMTP_FROM_NAME: "Invoice Management System"
        
        # Recipients
        AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
        EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS || secrets.AP_TEAM_EMAIL_LIST }}
        
        # Processing Settings
        VALIDATION_PERIOD: ${{ inputs.validation_period || 'current' }}
    
    - name: 📊 Upload Excel Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: excel-validation-reports
        path: invoice_validation_report_*.xlsx
        retention-days: 30
    
    - name: 📁 Upload ZIP Archives
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: invoice-zip-archives
        path: invoice_validation_*.zip
        retention-days: 7
    
    - name: 📋 Summary Report
      if: always()
      run: |
        echo "📊 Invoice Validation Summary"
        echo "Date: $(date)"
        echo "Status: ✅ Processing Completed"
        echo ""
        echo "📋 Excel Report: $(ls invoice_validation_report_*.xlsx 2>/dev/null | head -1 || echo 'Not found')"
        echo "📁 Invoice Files: $(find invoice_files -type f | wc -l) files processed"
        echo "📧 Email Recipients: AP Team (tax@, aditya.singh@, ap@koenig-solutions.com)"
        echo "🔄 Next Run: In 4 days"
