name: Invoice Validation Workflow

on:
  schedule:
    - cron: '0 6 */4 * *'   # every 4 days at 06:00 UTC
  workflow_dispatch:

jobs:
  validate-invoices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11.9'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg unzip fonts-liberation
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip cache purge
          pip install --no-cache-dir -r requirements.txt

      - name: Verify installations
        run: |
          google-chrome --version
          python -c "import selenium; print('Selenium:', selenium.__version__)"
          python -c "import pandas as pd; print('Pandas:', pd.__version__)"

      - name: Repair common broken f-strings
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path("main.py")
          s = p.read_text(encoding="utf-8")

          # 1) If someone split lines right after print(f"
          s = re.sub(r'print\(\s*f"\s*\n\s*', 'print(f"', s)

          # 2) Rare: print(f"""...") got ellipsis injected
          s = re.sub(r'print\(\s*f"""\s*\.\.\.\s*', 'print(f"', s)

          # 3) Naive join: if a line has an opening print(f" and ends without a closing quote,
          #    merge subsequent lines until we hit the first double quote.
          lines = s.splitlines(True)
          out = []
          open_idx = None
          for i, line in enumerate(lines):
              if open_idx is None:
                  out.append(line)
                  if re.search(r'print\(\s*f"\s*[^"]*$', line):
                      open_idx = len(out) - 1
              else:
                  out[open_idx] = out[open_idx].rstrip('\n') + line
                  # Close once we see a double quote on a later line
                  if '"' in line:
                      open_idx = None

          s2 = ''.join(out)
          p.write_text(s2, encoding="utf-8")
          print("Applied f-string repairs")
          PY

      - name: Show lines around the error spot
        run: |
          echo "----- main.py lines 540..580 -----"
          nl -ba main.py | sed -n '540,580p' || true
          echo "----------------------------------"
          
      - name: Repair common broken f-strings
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path("main.py")
          s = p.read_text(encoding="utf-8")

          # 1) If someone split lines right after print(f"
          s = re.sub(r'print\(\s*f"\s*\n\s*', 'print(f"', s)

          # 2) Rare: print(f"""...") got ellipsis injected
          s = re.sub(r'print\(\s*f"""\s*\.\.\.\s*', 'print(f"', s)

          # 3) Naive join: if a line has an opening print(f" and ends without a closing quote,
          #    merge subsequent lines until we hit the first double quote.
          lines = s.splitlines(True)
          out = []
          open_idx = None
          for i, line in enumerate(lines):
              if open_idx is None:
                  out.append(line)
                  if re.search(r'print\(\s*f"\s*[^"]*$', line):
                      open_idx = len(out) - 1
              else:
                  out[open_idx] = out[open_idx].rstrip('\n') + line
                  # Close once we see a double quote on a later line
                  if '"' in line:
                      open_idx = None

          s2 = ''.join(out)
          p.write_text(s2, encoding="utf-8")
          print("Applied f-string repairs")
          PY

      - name: Show lines around the error spot
        run: |
          echo "----- main.py lines 540..580 -----"
          nl -ba main.py | sed -n '540,580p' || true
          echo "----------------------------------"

      - name: Byte-compile to catch syntax early
        run: python -m py_compile main.py

      - name: Run invoice validation (headless via xvfb)
        run: xvfb-run -a python3 main.py run 2>&1 | tee run.log
        env:
          RMS_BASE_URL: https://rms.koenig-solutions.com
          DB_PATH: invoice_validation.db
          EXCEL_PATH: invoice_validation_report.xlsx
          RMS_USER: ${{ secrets.RMS_USER }}
          RMS_PASS: ${{ secrets.RMS_PASS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
          EMAIL_DEBUG: "false"
          SEND_EMAIL: "1"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_number }}
          path: |
            run.log
            *.xlsx
            *.csv
            *.log
            *.db
            data/
          retention-days: 30
