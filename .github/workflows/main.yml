name: 🚀 Enhanced Vendor Invoice Validator

on:
  schedule:
    - cron: '0 3 */4 * *'  # Runs every 4 days at 08:30 IST
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # Existing secrets
      RMS_USER: ${{ secrets.RMS_USER }}
      RMS_PASS: ${{ secrets.RMS_PASS }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      
      # Enhanced features environment
      AP_TEAM_EMAIL_LIST: ${{ secrets.AP_TEAM_EMAIL_LIST }}
      ENHANCED_FEATURES_ENABLED: "true"
      HISTORICAL_TRACKING_ENABLED: "true"
      
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🔧 Setup Chrome for Selenium
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: 📦 Install enhanced dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗄️ Initialize enhanced databases
        run: |
          mkdir -p data
          python -c "
          try:
              from invoice_tracker import create_tables
              create_tables()
              print('✅ Standard databases initialized')
          except Exception as e:
              print(f'⚠️ Database setup: {e}')
          
          try:
              from enhanced_processor import KoenigEnhancedProcessor
              processor = KoenigEnhancedProcessor()
              print('✅ Enhanced databases initialized')
          except Exception as e:
              print(f'⚠️ Enhanced setup: {e}')
          "

      - name: 🚀 Run enhanced validation
        run: |
          echo "🚀 Starting enhanced invoice validation with 21 new fields..."
          python main.py
          echo "✅ Enhanced validation completed successfully"

      - name: 📊 Verify enhanced reports
        run: |
          echo "📊 Generated reports:"
          ls -la data/*enhanced*.xlsx 2>/dev/null && echo "✅ Enhanced reports found" || echo "⚠️ No enhanced reports"
          ls -la data/*detailed*.xlsx 2>/dev/null && echo "✅ Detailed reports found" || echo "⚠️ No detailed reports"
          ls -la enhanced_invoice_history.db 2>/dev/null && echo "✅ Enhanced database found" || echo "⚠️ No enhanced database"

      - name: 📦 Archive enhanced artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: enhanced-validation-reports-${{ github.run_number }}
          path: |
            data/enhanced_*.xlsx
            data/*_detailed_*.xlsx
            data/*.html
            enhanced_invoice_history.db
            invoice_validation.db
          retention-days: 90

      - name: 🎯 Deployment summary
        if: always()
        run: |
          echo "🎉 Enhanced Invoice Validation System Deployment Summary"
          echo "======================================================"
          echo "📊 Dashboard URL: https://vendor-invoice-validator-nsgukywijdjsctgxmyb9eq.streamlit.app/"
          echo "🚀 Features: 21 enhanced fields, multi-location GST/VAT, historical tracking"
          echo "📧 Status: Email notifications sent to AP team"
          echo "🔄 Next run: Automatically in 4 days"
          echo "✅ Deployment: ${{ job.status }}"
